  {name:"Rookie",min:0},{name:"Learner",min:50},{name:"Student",min:150},{name:"Practitioner",min:300},
  {name:"Specialist",min:500},{name:"Expert",min:750},{name:"Master",min:1000},{name:"Guru",min:1400},{name:"Legend",min:1900}
];

function getLevel(xp) {
  let lvl = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.min) lvl = l; }
  const idx = LEVELS.indexOf(lvl);
  const next = LEVELS[idx+1];
  return { ...lvl, idx, next, progress: next ? ((xp - lvl.min) / (next.min - lvl.min)) * 100 : 100 };
}

              {(chartFilter==="all"||chartFilter==="progress") && <>
                <CCard t="Phase Progress" s="Total vs Completed per phase" f>
                  <ResponsiveContainer width="100%" height={300}><BarChart data={phaseData} margin={{left:0,right:10,bottom:60}}><XAxis dataKey="name" tick={{fontSize:8,fontWeight:600,fill:"var(--text-tertiary)"}} angle={-40} textAnchor="end" interval={0}/><YAxis tick={{fontSize:10,fill:"var(--text-tertiary)"}}/><RTooltip/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="total" name="Total" fill="var(--border)" radius={[4,4,0,0]}/><Bar dataKey="done" name="Done" fill="var(--accent)" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>
                </CCard>
                <CCard t="Cumulative Progress vs Target" s="Track if you're on pace — 1 task/day" f>
                  <ResponsiveContainer width="100%" height={280}><AreaChart data={cumulativeData} margin={{left:0,right:10}}><XAxis dataKey="day" tick={{fontSize:9,fill:"var(--text-tertiary)"}}/><YAxis tick={{fontSize:10,fill:"var(--text-tertiary)"}}/><RTooltip/><Legend wrapperStyle={{fontSize:11}}/><Area type="monotone" dataKey="target" name="Target" stroke="#22c55e" fill="rgba(34,197,94,.08)" strokeWidth={2} strokeDasharray="6 3" dot={false}/><Area type="monotone" dataKey="done" name="Your Progress" stroke="var(--accent)" fill="var(--accent-light)" strokeWidth={2.5} dot={false}/></AreaChart></ResponsiveContainer>
                </CCard>
                <CCard t="Phase Completion Journey" s="% complete across each phase" f>
                  <ResponsiveContainer width="100%" height={280}><LineChart data={phaseData.map(p=>({...p,pct:p.total?Math.round(p.done/p.total*100):0}))} margin={{left:0,right:10,bottom:60}}><XAxis dataKey="name" tick={{fontSize:8,fontWeight:600,fill:"var(--text-tertiary)"}} angle={-40} textAnchor="end" interval={0}/><YAxis domain={[0,100]} tick={{fontSize:10,fill:"var(--text-tertiary)"}} unit="%"/><RTooltip formatter={v=>`${v}%`}/><Line type="monotone" dataKey="pct" name="% Complete" stroke="var(--warning)" strokeWidth={2.5} dot={{fill:"var(--warning)",r:4}}/></LineChart></ResponsiveContainer>
                </CCard>
              </>}
              {(chartFilter==="all"||chartFilter==="difficulty") && <>
                <CCard t="Difficulty Breakdown" s="Total vs Completed per level">
                  <ResponsiveContainer width="100%" height={260}><BarChart data={lvlData}><XAxis dataKey="name" tick={{fontSize:11,fontWeight:600,fill:"var(--text-secondary)"}}/><YAxis tick={{fontSize:10,fill:"var(--text-tertiary)"}}/><RTooltip/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="total" name="Total" fill="var(--border)" radius={[4,4,0,0]}/><Bar dataKey="done" name="Done" fill="#8b5cf6" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>
                </CCard>
                <CCard t="Skill Radar Map" s="Your competency across categories">
                  <ResponsiveContainer width="100%" height={260}><RadarChart data={radarData}><PolarGrid stroke="var(--border)"/><PolarAngleAxis dataKey="subject" tick={{fontSize:9,fontWeight:600,fill:"var(--text-tertiary)"}}/><PolarRadiusAxis domain={[0,100]} tick={false} axisLine={false}/><Radar dataKey="pct" stroke="var(--accent)" fill="var(--accent)" fillOpacity={.15} strokeWidth={2}/></RadarChart></ResponsiveContainer>
                </CCard>
              </>}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:32}}>
              <button onClick={() => { if(confirm("Reset all progress? This cannot be undone.")) { setCompleted({}); setNotes({}); } }} className="action-btn" style={{padding:"10px 20px",background:"rgba(239,68,68,.08)",color:"var(--danger)",border:"1.5px solid rgba(239,68,68,.2)",borderRadius:10,fontWeight:700,fontSize:11}}>Reset Progress</button>
              <button onClick={() => { if(confirm("Log out? Progress is saved.")) setUser(null); }} className="action-btn" style={{padding:"10px 20px",background:"var(--bg-tertiary)",color:"var(--text-secondary)",border:"1.5px solid var(--border)",borderRadius:10,fontWeight:700,fontSize:11}}>Change Name</button>
            </div>
          </div>
        )}

        {/* ===== FOCUS TIMER ===== */}
        {tab === "timer" && (
          <div style={{padding:"20px 0 50px"}}>
            <div className="fade-up" style={{background:"var(--bg-secondary)",borderRadius:18,padding:"32px",border:"1px solid var(--border)",textAlign:"center",maxWidth:420,margin:"0 auto",boxShadow:"var(--card-shadow)"}}>
              <h3 style={{fontSize:18,fontWeight:800,color:"var(--text-primary)",marginBottom:4}}>Focus Timer</h3>
              <p style={{color:"var(--text-tertiary)",fontSize:12,marginBottom:20}}>Stay focused on your current task</p>

              {pomodoroTask && (
                <div style={{background:"var(--accent-light)",borderRadius:10,padding:"10px 16px",marginBottom:20,border:"1px solid var(--accent)"}}>
                  <p style={{fontSize:11,fontWeight:700,color:"var(--accent)"}}>Focusing on: Day {pomodoroTask.d}</p>
                  <p style={{fontSize:12,fontWeight:600,color:"var(--text-primary)",marginTop:2}}>{pomodoroTask.task}</p>
                </div>
              )}

              <div style={{position:"relative",width:200,height:200,margin:"0 auto 24px"}}>
                <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
                  <circle cx={100} cy={100} r={90} fill="none" stroke="var(--bg-tertiary)" strokeWidth={8}/>
                  <circle cx={100} cy={100} r={90} fill="none" stroke={pomodoroActive?"var(--accent)":"var(--border)"} strokeWidth={8} strokeDasharray={2*Math.PI*90} strokeDashoffset={2*Math.PI*90*(1-pomodoroTime/(25*60))} strokeLinecap="round" className="timer-ring"/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:40,fontWeight:900,fontFamily:"'JetBrains Mono'",color:"var(--text-primary)",letterSpacing:"-2px"}}>{formatTime(pomodoroTime)}</span>
                </div>
              </div>

              <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>
                {[15,25,45].map(m => (
                  <button key={m} onClick={() => { setPomodoroTime(m*60); setPomodoroActive(false); }} className="action-btn pill" style={{padding:"6px 14px",borderRadius:8,fontSize:11,fontWeight:700,background:pomodoroTime===m*60&&!pomodoroActive?"var(--accent)":"var(--bg-tertiary)",color:pomodoroTime===m*60&&!pomodoroActive?"#fff":"var(--text-secondary)",border:"none"}}>{m}m</button>
                ))}
              </div>

              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={() => setPomodoroActive(!pomodoroActive)} className="action-btn" style={{padding:"12px 28px",borderRadius:10,background:pomodoroActive?"var(--danger)":"var(--accent)",color:"#fff",fontSize:13,fontWeight:700}}>
                  {pomodoroActive ? "Pause" : pomodoroTime < 25*60 ? "Resume" : "Start"}
                </button>
                <button onClick={() => { setPomodoroTime(25*60); setPomodoroActive(false); }} className="action-btn" style={{padding:"12px 20px",borderRadius:10,background:"var(--bg-tertiary)",color:"var(--text-secondary)",fontSize:13,fontWeight:700,border:"1px solid var(--border)"}}>Reset</button>
              </div>

              {pomodoroTime === 0 && (
                <div className="bounce-in" style={{marginTop:20,padding:"14px",background:"var(--success-light)",borderRadius:10,border:"1px solid var(--success)"}}>
                  <p style={{fontSize:24}}>🎉</p>
                  <p style={{fontSize:14,fontWeight:800,color:"var(--success)"}}>Time's up! Great focus session!</p>
                </div>
              )}
            </div>

            {/* Quick task selector for timer */}
            {nextTask && !pomodoroTask && (
              <div className="fade-up" style={{maxWidth:420,margin:"16px auto 0",animationDelay:".1s"}}>
                <button onClick={() => setPomodoroTask(nextTask)} className="action-btn" style={{width:"100%",padding:"14px",borderRadius:12,background:"var(--accent-light)",border:"1.5px solid var(--accent)",color:"var(--accent)",fontSize:13,fontWeight:700}}>
                  🎯 Focus on: Day {nextTask.d} — {nextTask.task}
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"20px",borderTop:"1px solid var(--border)",marginTop:20}}>
        <p style={{color:"var(--text-tertiary)",fontSize:11,fontWeight:500}}>
          Study Analytics — 100 Days Digital Marketing Mastery  ·  {totalDone}/100 completed  ·  {xp} XP earned
        </p>
      </div>
    </div>
  );
}

function clamp(min, vw, max) {
  return `clamp(${min}px, ${vw}vw, ${max}px)`;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
