<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track and visualize your 100-day digital marketing mastery journey with detailed analytics, progress charts, and performance insights." />

    <title>Study Analytics — 100 Days Digital Marketing Mastery</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:title" content="Study Analytics — 100 Days Digital Marketing Mastery" />
    <meta property="og:description" content="Track and visualize your 100-day digital marketing mastery journey with detailed analytics, progress charts, and performance insights." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#ef4444;font-family:monospace;font-size:14px;background:#0a0e1a;min-height:100vh">' +
          '<h2 style="color:#f1f5f9;margin-bottom:16px">Error Loading App</h2>' +
          '<p>' + msg + '</p>' +
          '<p style="color:#64748b;margin-top:8px">' + (src||'') + ':' + (line||'') + '</p>' +
          '<pre style="color:#fbbf24;margin-top:16px;white-space:pre-wrap">' + (err && err.stack ? err.stack : '') + '</pre>' +
          '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#ef4444;font-family:monospace;font-size:14px;background:#0a0e1a;min-height:100vh">' +
          '<h2 style="color:#f1f5f9;margin-bottom:16px">Error Loading App</h2>' +
          '<p>' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '</p>' +
          '<pre style="color:#fbbf24;margin-top:16px;white-space:pre-wrap">' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>' +
          '</div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
