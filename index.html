function getLevel(xp) {
  var lvl = LEVELS[0];
  for (var i = 0; i < LEVELS.length; i++) { if (xp >= LEVELS[i].min) lvl = LEVELS[i]; }
  var idx = LEVELS.indexOf(lvl);
  var next = LEVELS[idx+1];
  return { name: lvl.name, min: lvl.min, idx: idx, next: next, progress: next ? ((xp - lvl.min) / (next.min - lvl.min)) * 100 : 100 };
}

/* ---- Error Boundary ---- */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error: error }; }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{padding:40,textAlign:'center',color:'var(--tx)',fontFamily:'Inter'}},
        React.createElement('h2', null, 'Something went wrong'),
        React.createElement('p', {style:{color:'var(--tx3)',marginTop:8}}, String(this.state.error)),

      );
    }
    return this.props.children;
  }
}

  );
}

        {/* ===== CHECKLIST TAB ===== */}

            {["All","Beginner","Intermediate","Advanced"].map(function(l) { return <button key={l} className="pill" onClick={function(){setFilterLevel(l)}} style={{padding:"5px 12px",borderRadius:8,border:"none",fontSize:10,fontWeight:700,background:filterLevel===l?"var(--tx)":"var(--bg3)",color:filterLevel===l?"var(--bg)":"var(--tx2)"}}>{l==="All"?"All Levels":l}</button>; })}

          </div>

          {filteredTasks.length===0 && <div style={{textAlign:"center",padding:"40px 20px",color:"var(--tx3)"}}><div style={{fontSize:40,marginBottom:10}}>🔍</div><p style={{fontWeight:700}}>No tasks found</p></div>}

          {viewMode==="list" && <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {filteredTasks.map(function(t,i) { var done=!!completed[t.d]; return (

                <div onClick={function(){toggle(t.d)}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer"}}>
                  <div style={{width:28,height:28,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,transition:"all .3s",background:done?"var(--ok)":"var(--bg2)",border:"2px solid "+(done?"var(--ok)":"var(--bd)"),color:done?"#fff":"transparent",transform:done?"rotate(0) scale(1)":"rotate(-90deg) scale(.8)"}}>✓</div>
                  <div style={{background:PC[t.phase]||"#64748b",color:"#fff",fontWeight:800,fontSize:10,borderRadius:6,padding:"3px 8px",minWidth:42,textAlign:"center",fontFamily:"'JetBrains Mono'",flexShrink:0}}>D{t.d}</div>

                    <button onClick={function(){saveNote(t.d)}} className="action-btn" style={{padding:"6px 14px",borderRadius:6,background:"var(--ac)",color:"#fff",fontSize:11,fontWeight:700}}>Save</button>
                    <button onClick={function(){setShowNoteFor(null)}} className="action-btn" style={{padding:"6px 14px",borderRadius:6,background:"var(--bg3)",color:"var(--tx2)",fontSize:11,fontWeight:700}}>Cancel</button>

                  <span style={{fontSize:8,fontWeight:700,color:LC[t.lvl],background:LC[t.lvl]+"12",padding:"2px 5px",borderRadius:3}}>{t.lvl}</span>

              </div>

          </div>}
        </div>}

        {/* ===== PHASES TAB ===== */}
        {tab==="phases" && <div style={{padding:"20px 0 50px"}}>

              <div className="phase-row" style={{background:"var(--bg2)",borderRadius:14,padding:"18px 20px",border:"1px solid var(--bd)",borderLeft:"4px solid "+PC[phase],cursor:"pointer",boxShadow:"var(--sh)"}} onClick={function(){setFilterPhase(phase);setTab("checklist")}}>

                  <div><h3 style={{fontSize:15,fontWeight:800,color:"var(--tx)",margin:0}}>{phase}</h3><p style={{color:"var(--tx3)",fontSize:11,marginTop:2}}>{tasks.length} tasks · {done} done</p></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:900,fontFamily:"'JetBrains Mono'",color:PC[phase]}}>{pp}%</div><div style={{fontSize:9,color:pp===100?"var(--ok)":"var(--tx3)",fontWeight:700}}>{pp===100?"COMPLETE ✓":"IN PROGRESS"}</div></div>
                </div>
                <div style={{background:"var(--bg3)",borderRadius:10,height:6,overflow:"hidden"}}><div style={{height:"100%",width:pp+"%",background:"linear-gradient(90deg,"+PC[phase]+","+PC[phase]+"aa)",borderRadius:10,transition:"width 1s ease"}}/></div>
                <div style={{display:"flex",gap:3,marginTop:10,flexWrap:"wrap"}}>
                  {tasks.map(function(t) { return <div key={t.d} style={{width:20,height:20,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,fontFamily:"'JetBrains Mono'",cursor:"pointer",transition:"all .15s",background:completed[t.d]?PC[phase]:"var(--bg3)",color:completed[t.d]?"#fff":"var(--tx3)",border:completed[t.d]?"none":"1px solid var(--bd)"}} onClick={function(e){e.stopPropagation();toggle(t.d)}}>{t.d}</div>; })}
                </div>
              </div>
            </div>
          ); })}
        </div>}

        {/* ===== HEATMAP TAB ===== */}
        {tab==="heatmap" && <div style={{padding:"20px 0 50px"}}>
          <div className="fade-up" style={{background:"var(--bg2)",borderRadius:16,padding:24,border:"1px solid var(--bd)",marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:800,color:"var(--tx)",marginBottom:4}}>Completion Heatmap</h3>
            <p style={{color:"var(--tx3)",fontSize:12,marginBottom:16}}>Click any cell to toggle completion</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(10, 1fr)",gap:4}}>
              {heatmapData.map(function(h) { var task = TASKS[h.day-1]; return (
                <div key={h.day} onClick={function(){toggle(h.day)}} style={{aspectRatio:"1",borderRadius:6,cursor:"pointer",background:h.done?PC[task.phase]:"var(--bg3)",border:"1.5px solid "+(h.done?"transparent":"var(--bd)"),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all .2s ease",opacity:h.done?1:.7,position:"relative"}} className="grid-card">
                  <span style={{fontSize:11,fontWeight:800,fontFamily:"'JetBrains Mono'",color:h.done?"#fff":"var(--tx3)"}}>{h.day}</span>
                  <span style={{fontSize:6,fontWeight:600,color:h.done?"rgba(255,255,255,.7)":"var(--tx3)",marginTop:1}}>{task.cat}</span>

                </div>
              ); })}
            </div>
            <div style={{display:"flex",gap:12,marginTop:16,flexWrap:"wrap",justifyContent:"center"}}>
              {Object.entries(PC).map(function(entry) { return <div key={entry[0]} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:3,background:entry[1]}}/><span style={{fontSize:9,fontWeight:600,color:"var(--tx3)"}}>{entry[0]}</span></div>; })}
            </div>
          </div>
          <div className="fade-up" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
            <div style={{background:"var(--bg2)",borderRadius:14,padding:20,border:"1px solid var(--bd)",textAlign:"center"}}><div style={{fontSize:36,marginBottom:6}}>🔥</div><div style={{fontSize:28,fontWeight:900,fontFamily:"'JetBrains Mono'",color:"var(--wn)"}}>{streak}</div><div style={{fontSize:11,color:"var(--tx3)",fontWeight:600}}>Current Streak</div></div>
            <div style={{background:"var(--bg2)",borderRadius:14,padding:20,border:"1px solid var(--bd)",textAlign:"center"}}><div style={{fontSize:36,marginBottom:6}}>⚡</div><div style={{fontSize:28,fontWeight:900,fontFamily:"'JetBrains Mono'",color:"var(--ac)"}}>{xp}</div><div style={{fontSize:11,color:"var(--tx3)",fontWeight:600}}>Total XP</div></div>

          </div>
        </div>}

        {/* ===== ACHIEVEMENTS TAB ===== */}
        {tab==="achievements" && <div style={{padding:"20px 0 50px"}}>
          <div style={{textAlign:"center",marginBottom:24}} className="fade-up">

                  <div><h4 style={{fontSize:14,fontWeight:800,color:earned?"var(--tx)":"var(--tx3)",margin:0}}>{a.title}</h4><p style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>{a.desc}</p></div>
                </div>

              </div>
            ); })}
          </div>
        </div>}

        {/* ===== ANALYTICS TAB ===== */}
        {tab==="analytics" && <div style={{padding:"20px 0 50px"}}>

            {[{id:"all",l:"All"},{id:"progress",l:"Progress"},{id:"category",l:"Categories"},{id:"difficulty",l:"Difficulty"}].map(function(f) { return <button key={f.id} className="pill" onClick={function(){setChartFilter(f.id)}} style={{padding:"7px 14px",borderRadius:8,border:chartFilter===f.id?"none":"1.5px solid var(--bd)",fontSize:11,fontWeight:700,background:chartFilter===f.id?"var(--tx)":"var(--bg2)",color:chartFilter===f.id?"var(--bg)":"var(--tx2)"}}>{f.l}</button>; })}
          </div>
          <SafeChart>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:14}} className="mobile-grid-1">
            {(chartFilter==="all"||chartFilter==="category") && [
              <CCard key="c1" t="Tasks by Category" s="Distribution of all 100 tasks"><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={catData} dataKey="total" nameKey="name" cx="50%" cy="50%" outerRadius={90} innerRadius={45} paddingAngle={3} label={function(e){return e.name+" "+Math.round(e.percent*100)+"%"}} style={{fontSize:9,fontWeight:600}}>{catData.map(function(e,i){return <Cell key={i} fill={CC[e.name]}/>})}</Pie><RTooltip/></PieChart></ResponsiveContainer></CCard>,
              <CCard key="c2" t="Completion by Category" s="Done tasks per category"><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={catData.filter(function(c){return c.done>0})} dataKey="done" nameKey="name" cx="50%" cy="50%" outerRadius={90} innerRadius={45} paddingAngle={3} label={function(e){return e.name+": "+e.value}} style={{fontSize:9,fontWeight:600}}>{catData.filter(function(c){return c.done>0}).map(function(e,i){return <Cell key={i} fill={CC[e.name]}/>})}</Pie><RTooltip/></PieChart></ResponsiveContainer></CCard>,
              <CCard key="c3" t="Category %" s="Completion percentage" f><ResponsiveContainer width="100%" height={260}><BarChart data={catData.map(function(c){return Object.assign({},c,{pct:c.total?Math.round(c.done/c.total*100):0})})} layout="vertical" margin={{left:60}}><XAxis type="number" domain={[0,100]} tick={{fontSize:10,fill:"var(--tx3)"}} unit="%"/><YAxis dataKey="name" type="category" tick={{fontSize:10,fontWeight:600,fill:"var(--tx2)"}}/><RTooltip formatter={function(v){return v+"%"}}/><Bar dataKey="pct" name="% Complete" radius={[0,6,6,0]}>{catData.map(function(e,i){return <Cell key={i} fill={CC[e.name]}/>})}</Bar></BarChart></ResponsiveContainer></CCard>
            ]}
            {(chartFilter==="all"||chartFilter==="progress") && [
              <CCard key="p1" t="Phase Progress" s="Total vs Completed" f><ResponsiveContainer width="100%" height={300}><BarChart data={phaseData} margin={{left:0,right:10,bottom:60}}><XAxis dataKey="name" tick={{fontSize:8,fontWeight:600,fill:"var(--tx3)"}} angle={-40} textAnchor="end" interval={0}/><YAxis tick={{fontSize:10,fill:"var(--tx3)"}}/><RTooltip/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="total" name="Total" fill="var(--bd)" radius={[4,4,0,0]}/><Bar dataKey="done" name="Done" fill="var(--ac)" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></CCard>,
              <CCard key="p2" t="Cumulative vs Target" s="1 task/day pace" f><ResponsiveContainer width="100%" height={280}><AreaChart data={cumulativeData} margin={{left:0,right:10}}><XAxis dataKey="day" tick={{fontSize:9,fill:"var(--tx3)"}}/><YAxis tick={{fontSize:10,fill:"var(--tx3)"}}/><RTooltip/><Legend wrapperStyle={{fontSize:11}}/><Area type="monotone" dataKey="target" name="Target" stroke="#22c55e" fill="rgba(34,197,94,.08)" strokeWidth={2} strokeDasharray="6 3" dot={false}/><Area type="monotone" dataKey="done" name="Progress" stroke="var(--ac)" fill="var(--acl)" strokeWidth={2.5} dot={false}/></AreaChart></ResponsiveContainer></CCard>,
              <CCard key="p3" t="Phase Journey" s="% per phase" f><ResponsiveContainer width="100%" height={280}><LineChart data={phaseData.map(function(p){return Object.assign({},p,{pct:p.total?Math.round(p.done/p.total*100):0})})} margin={{left:0,right:10,bottom:60}}><XAxis dataKey="name" tick={{fontSize:8,fontWeight:600,fill:"var(--tx3)"}} angle={-40} textAnchor="end" interval={0}/><YAxis domain={[0,100]} tick={{fontSize:10,fill:"var(--tx3)"}} unit="%"/><RTooltip formatter={function(v){return v+"%"}}/><Line type="monotone" dataKey="pct" name="% Complete" stroke="var(--wn)" strokeWidth={2.5} dot={{fill:"var(--wn)",r:4}}/></LineChart></ResponsiveContainer></CCard>
            ]}
            {(chartFilter==="all"||chartFilter==="difficulty") && [
              <CCard key="d1" t="Difficulty Breakdown" s="Total vs Completed per level"><ResponsiveContainer width="100%" height={260}><BarChart data={lvlData}><XAxis dataKey="name" tick={{fontSize:11,fontWeight:600,fill:"var(--tx2)"}}/><YAxis tick={{fontSize:10,fill:"var(--tx3)"}}/><RTooltip/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="total" name="Total" fill="var(--bd)" radius={[4,4,0,0]}/><Bar dataKey="done" name="Done" fill="#8b5cf6" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></CCard>,
              <CCard key="d2" t="Skill Radar" s="Competency across categories"><ResponsiveContainer width="100%" height={260}><RadarChart data={radarData}><PolarGrid stroke="var(--bd)"/><PolarAngleAxis dataKey="subject" tick={{fontSize:9,fontWeight:600,fill:"var(--tx3)"}}/><PolarRadiusAxis domain={[0,100]} tick={false} axisLine={false}/><Radar dataKey="pct" stroke="var(--ac)" fill="var(--ac)" fillOpacity={.15} strokeWidth={2}/></RadarChart></ResponsiveContainer></CCard>
            ]}
          </div>
          </SafeChart>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:32}}>
            <button onClick={function(){if(confirm("Reset all progress?")){setCompleted({});setNotes({})}}} className="action-btn" style={{padding:"10px 20px",background:"rgba(239,68,68,.08)",color:"var(--dn)",border:"1.5px solid rgba(239,68,68,.2)",borderRadius:10,fontWeight:700,fontSize:11}}>Reset Progress</button>
            <button onClick={function(){if(confirm("Log out? Progress saved.")){setUser(null)}}} className="action-btn" style={{padding:"10px 20px",background:"var(--bg3)",color:"var(--tx2)",border:"1.5px solid var(--bd)",borderRadius:10,fontWeight:700,fontSize:11}}>Change Name</button>
          </div>
        </div>}

        {/* ===== FOCUS TIMER TAB ===== */}
        {tab==="timer" && <div style={{padding:"20px 0 50px"}}>
          <div className="fade-up" style={{background:"var(--bg2)",borderRadius:18,padding:32,border:"1px solid var(--bd)",textAlign:"center",maxWidth:420,margin:"0 auto"}}>
            <h3 style={{fontSize:18,fontWeight:800,color:"var(--tx)",marginBottom:4}}>Focus Timer</h3>
            <p style={{color:"var(--tx3)",fontSize:12,marginBottom:20}}>Stay focused on your current task</p>
            {pomodoroTask && <div style={{background:"var(--acl)",borderRadius:10,padding:"10px 16px",marginBottom:20,border:"1px solid var(--ac)"}}><p style={{fontSize:11,fontWeight:700,color:"var(--ac)"}}>Day {pomodoroTask.d}</p><p style={{fontSize:12,fontWeight:600,color:"var(--tx)",marginTop:2}}>{pomodoroTask.task}</p></div>}
            <div style={{position:"relative",width:200,height:200,margin:"0 auto 24px"}}>
              <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
                <circle cx={100} cy={100} r={90} fill="none" stroke="var(--bg3)" strokeWidth={8}/>
                <circle cx={100} cy={100} r={90} fill="none" stroke={pomodoroActive?"var(--ac)":"var(--bd)"} strokeWidth={8} strokeDasharray={2*Math.PI*90} strokeDashoffset={2*Math.PI*90*(1-pomodoroTime/(25*60))} strokeLinecap="round" className="timer-ring"/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:40,fontWeight:900,fontFamily:"'JetBrains Mono'",color:"var(--tx)",letterSpacing:"-2px"}}>{formatTime(pomodoroTime)}</span></div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>
              {[15,25,45].map(function(m) { return <button key={m} onClick={function(){setPomodoroTime(m*60);setPomodoroActive(false)}} className="action-btn pill" style={{padding:"6px 14px",borderRadius:8,fontSize:11,fontWeight:700,background:pomodoroTime===m*60&&!pomodoroActive?"var(--ac)":"var(--bg3)",color:pomodoroTime===m*60&&!pomodoroActive?"#fff":"var(--tx2)",border:"none"}}>{m}m</button>; })}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={function(){setPomodoroActive(!pomodoroActive)}} className="action-btn" style={{padding:"12px 28px",borderRadius:10,background:pomodoroActive?"var(--dn)":"var(--ac)",color:"#fff",fontSize:13,fontWeight:700}}>{pomodoroActive?"Pause":pomodoroTime<25*60?"Resume":"Start"}</button>
              <button onClick={function(){setPomodoroTime(25*60);setPomodoroActive(false)}} className="action-btn" style={{padding:"12px 20px",borderRadius:10,background:"var(--bg3)",color:"var(--tx2)",fontSize:13,fontWeight:700,border:"1px solid var(--bd)"}}>Reset</button>
            </div>
            {pomodoroTime===0 && <div className="bounce-in" style={{marginTop:20,padding:14,background:"var(--okl)",borderRadius:10,border:"1px solid var(--ok)"}}><p style={{fontSize:24}}>🎉</p><p style={{fontSize:14,fontWeight:800,color:"var(--ok)"}}>Great focus session!</p></div>}
          </div>
          {nextTask && !pomodoroTask && <div className="fade-up" style={{maxWidth:420,margin:"16px auto 0"}}><button onClick={function(){setPomodoroTask(nextTask)}} className="action-btn" style={{width:"100%",padding:14,borderRadius:12,background:"var(--acl)",border:"1.5px solid var(--ac)",color:"var(--ac)",fontSize:13,fontWeight:700}}>🎯 Focus on: Day {nextTask.d} — {nextTask.task}</button></div>}
        </div>}

      </div>
      <div style={{textAlign:"center",padding:20,borderTop:"1px solid var(--bd)",marginTop:20}}><p style={{color:"var(--tx3)",fontSize:11,fontWeight:500}}>Study Analytics — 100 Days Digital Marketing Mastery · {totalDone}/100 · {xp} XP</p></div>
    </div>
    </ErrorBoundary>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
